name: compass_app
description: >-
  A sample app that helps users build and book itineraries for trips.
publish_to: none
version: 0.2.20

environment:
  sdk: ^3.8.0

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.16
  freezed_annotation: ^3.1.0
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  http: ^1.1.0
  intl: any
  json_annotation: ^4.9.0
  logging: ^1.3.0
  provider: ^6.1.2
  result_command: ^2.1.0
  result_dart: ^2.1.1
  share_plus: ^10.1.3
  shared_preferences: ^2.3.5

dev_dependencies:
  build_runner: ^2.5.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.1.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  mocktail_image_network: ^1.2.0
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/activities.json
    - assets/destinations.json
    - assets/logo.svg
    - assets/user.jpg
